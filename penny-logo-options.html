<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PENNY Logo 方向选择</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="penny-body logo-option-body">
    <main class="logo-option-main">
      <section class="logo-option-hero">
        <p class="eyebrow">PENNY Brand Mark</p>
        <h1>PENNY Logo 方向选择</h1>
        <p class="lede">品牌定位：PENNY——陪你发现孩子成长路上的全球机会。</p>
      </section>

      <section class="logo-option-grid">
        <article class="logo-option-card">
          <div class="logo-showcase">
            <svg class="penny-svg-logo" viewBox="0 0 120 120" role="img" aria-label="PENNY logo option A">
              <circle cx="60" cy="60" r="50" fill="#f6d96d" stroke="#173026" stroke-width="5"/>
              <path d="M34 70 C42 42, 78 42, 86 70" fill="none" stroke="#173026" stroke-width="7" stroke-linecap="round"/>
              <circle cx="43" cy="55" r="6" fill="#173026"/>
              <circle cx="77" cy="55" r="6" fill="#173026"/>
              <path d="M49 74 C56 80, 65 80, 72 74" fill="none" stroke="#173026" stroke-width="5" stroke-linecap="round"/>
              <path d="M60 21 L66 35 L81 36 L69 45 L73 60 L60 51 L47 60 L51 45 L39 36 L54 35 Z" fill="#dff7e7" stroke="#173026" stroke-width="3" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="logo-option-label">A · 陪伴感</span>
          <h2>小星币</h2>
          <p>像一枚给孩子收集机会的幸运币，温暖、亲近，适合面向家长的长期订阅。</p>
        </article>

        <article class="logo-option-card">
          <div class="logo-showcase">
            <svg class="penny-svg-logo" viewBox="0 0 120 120" role="img" aria-label="PENNY logo option B">
              <rect x="16" y="16" width="88" height="88" rx="26" fill="#dff7e7" stroke="#173026" stroke-width="5"/>
              <circle cx="60" cy="60" r="28" fill="#fffaf0" stroke="#173026" stroke-width="4"/>
              <path d="M34 60 H86 M60 32 C47 45, 47 75, 60 88 M60 32 C73 45, 73 75, 60 88" fill="none" stroke="#173026" stroke-width="4" stroke-linecap="round"/>
              <path d="M78 35 L88 32 L85 42" fill="none" stroke="#2f8f62" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M79 34 C69 43, 62 50, 55 61" fill="none" stroke="#2f8f62" stroke-width="5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="logo-option-label">B · 全球机会</span>
          <h2>机会罗盘</h2>
          <p>突出全球视野和方向感，更像“雷达/导航”产品，理性、可信、适合信息服务。</p>
        </article>

        <article class="logo-option-card">
          <div class="logo-showcase">
            <svg class="penny-svg-logo" viewBox="0 0 120 120" role="img" aria-label="PENNY logo option C">
              <circle cx="60" cy="60" r="50" fill="#173026" stroke="#173026" stroke-width="5"/>
              <path d="M37 78 C38 58, 49 44, 60 36 C71 44, 82 58, 83 78" fill="#fffaf0"/>
              <path d="M60 36 V84" stroke="#173026" stroke-width="5" stroke-linecap="round"/>
              <path d="M60 55 C50 54, 43 50, 39 42 C50 40, 57 44, 60 55 Z" fill="#dff7e7" stroke="#173026" stroke-width="3"/>
              <path d="M60 61 C72 59, 79 54, 84 45 C72 43, 63 48, 60 61 Z" fill="#f6d96d" stroke="#173026" stroke-width="3"/>
              <circle cx="60" cy="88" r="7" fill="#f6d96d" stroke="#fffaf0" stroke-width="3"/>
            </svg>
          </div>
          <span class="logo-option-label">C · 成长路径</span>
          <h2>萌芽路线</h2>
          <p>把“孩子成长”放在中心，像一颗向外探索的芽，情绪更柔软，也更有教育品牌感。</p>
        </article>

        <article class="logo-option-card">
          <div class="logo-showcase">
            <svg class="penny-svg-logo" viewBox="0 0 120 120" role="img" aria-label="PENNY logo option D">
              <rect x="18" y="24" width="84" height="72" rx="18" fill="#fffaf0" stroke="#173026" stroke-width="5"/>
              <path d="M30 45 H90 M30 62 H75 M30 79 H64" stroke="#173026" stroke-width="5" stroke-linecap="round"/>
              <circle cx="88" cy="78" r="18" fill="#f6d96d" stroke="#173026" stroke-width="5"/>
              <path d="M81 78 L87 84 L98 70" fill="none" stroke="#173026" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M37 18 L45 30 M83 18 L75 30" stroke="#2f8f62" stroke-width="5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="logo-option-label">D · 订阅情报</span>
          <h2>机会简报</h2>
          <p>更像邮件周报/机会清单的产品标识，清晰、专业，适合强调“每周筛选”。</p>
        </article>
      </section>
    </main>
  </body>
</html>
